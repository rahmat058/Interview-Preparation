# Node.js Express API — port 5000
# Build context: repository root
#
# Optional MongoDB: docker compose --profile with-db up --build -d

services:
  node-api:
    container_name: node-api
    build:
      context: ../..
      dockerfile: Docker/nodejs/Dockerfile
      args:
        APP_PATH: ${APP_PATH:-Docker/nodejs/app}
    ports:
      - "${NODE_PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/interview-prep}
    restart: unless-stopped
    networks:
      - node-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  mongo:
    container_name: node-mongo
    image: mongo:7-jammy
    profiles: [with-db]
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - node-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  node-network:
    driver: bridge

volumes:
  mongo-data:
